<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVE Control v3.0</title>
  <meta name="theme-color" content="#001D3D">
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EVE Control">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Pantalla de login -->
  <div id="login-screen">
    <div class="card">
      <h1>EVE Control</h1>
      <p class="subtitulo">EVERPLASTIC</p>
      <form id="login-form">
        <input type="text" id="login-username" placeholder="Usuario" autocomplete="username" required>
        <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="submit" class="btn-primary">Entrar</button>
        <div id="login-error"></div>
      </form>
    </div>
  </div>

  <!-- Shell de la app -->
  <div id="app-shell">
    <header class="app-header">
      <h1>EVE Control v3.0</h1>
      <span id="estado-conexion">🟢 En línea</span>
      <div class="header-actions">
        <button id="btn-admin">Admin</button>
        <button id="btn-salir">Salir</button>
      </div>
    </header>

    <nav class="tabs" id="tabs-container"></nav>

    <main id="main-content"></main>
  </div>

  <div id="toast-container"></div>

  <!-- SDKs externos -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- App -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/offline.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/reportes.js"></script>
  <script src="js/voz.js"></script>
  <script src="js/destaraje.js"></script>
  <script src="js/produccion.js"></script>
  <script src="js/pagos.js"></script>
  <script src="js/trazabilidad.js"></script>
  <script src="js/control-produccion.js"></script>
  <script src="js/reportes-ui.js"></script>
  <script src="js/admin-usuarios.js"></script>
  <script src="js/admin-importar.js"></script>
  <script src="js/admin-backup.js"></script>
  <script src="js/admin-config.js"></script>
  <script src="js/admin-datos.js"></script>
  <script src="js/admin.js"></script>

  <script>
    (function () {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('service-worker.js')
            .then(function (reg) {
              reg.addEventListener('updatefound', function () {
                const sw = reg.installing;
                sw.addEventListener('statechange', function () {
                  if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                    window.showSuccess('🔄 Nueva versión disponible. Recarga para actualizar.');
                  }
                });
              });
            })
            .catch(function (err) { console.error('SW error:', err); });
        });
      }

      var deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        if (!localStorage.getItem('eve-app-instalada')) {
          var btn = document.getElementById('btn-instalar-pwa');
          if (!btn) {
            btn = document.createElement('button');
            btn.id = 'btn-instalar-pwa';
            btn.textContent = '📲 Instalar App';
            var actions = document.querySelector('.header-actions');
            if (actions) actions.prepend(btn);
          }
          btn.style.display = '';
          btn.addEventListener('click', function () {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function (result) {
              if (result.outcome === 'accepted') {
                localStorage.setItem('eve-app-instalada', '1');
                btn.style.display = 'none';
              }
              deferredPrompt = null;
            });
          });
        }
      });
    })();
  </script>
</body>
</html>
